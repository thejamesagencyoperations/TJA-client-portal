<script>
  /* bootstrap: resolve the selected client's data BEFORE app.js reads window.CLIENT_DATA.
     Built-in clients use their rich seed; added clients build from the registry template. */
  (function () {
    try {
      var s = (typeof getSession === "function" && getSession()) || {};
      var id = s.client;
      // Staff own no client workspace: if they reach the dashboard without a real
      // client selected (id is a "_"-prefixed sentinel like _admin/_creative, or
      // empty), send them to the picker.
      if ((s.role === "admin" || s.role === "creative") && (!id || String(id).charAt(0) === "_")) {
        window.location.replace("clients.html"); return;
      }
      if (!id) { window.location.replace("index.html"); return; }   // no workspace → back to login
      var seeds = window.CLIENT_SEEDS || {};
      if (seeds[id]) { window.CLIENT_DATA = seeds[id]; }
      else {
        var meta = (window.TJA_STORE && window.TJA_STORE.get(id)) || { name: id };
        window.CLIENT_DATA = window.makeClientData({ name: meta.name, initials: meta.initials, logo: meta.logo, kind: meta.kind });
      }
    } catch (e) {
      console.warn("client bootstrap failed", e);
      window.location.replace("clients.html");
    }
  })();
</script>
