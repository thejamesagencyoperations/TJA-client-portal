<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJA Client Portal</title>
<script>(function(){try{if(localStorage.getItem('tja_theme')!=='dark')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css?v=134">
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand-logo">
      <svg viewBox="0 0 474 218" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The James Agency"><rect width="474" height="218" rx="6" fill="#F68E21"/><text x="237" y="158" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="170" letter-spacing="-6">tja</text></svg>
      <img src="assets/img/tja-logo.svg" alt="The James Agency" onerror="this.remove()">
    </div>
    <nav class="nav" id="nav">
      <div class="nav-item active" data-page="exec">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Executive Summary
      </div>
      <div class="nav-item" data-page="status">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        Status
      </div>
      <div class="nav-item" data-page="docs">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        Present Docs
      </div>
      <div class="nav-item" data-page="files">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h6l2 3h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
        Files
      </div>
      <div class="nav-item" data-page="backlog" id="navBacklog">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        Backlog
      </div>
    </nav>
    <div class="sidebar-foot">
      <div class="version-pill">Sandbox · v1.34</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="client-id">
        <div class="client-avatar" id="clientAvatar">CE</div>
        <div class="client-id-text">
          <div class="client-line"><span class="client-name" id="clientName">Celtic Elevator</span><span class="client-eng" id="clientMeta"></span></div>
          <div class="client-northstar" id="clientNorthstar"></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" id="clientsBack" style="display:none" onclick="window.location.href='clients.html'" title="Back to all clients">← Clients</button>
        <button class="icon-btn" id="themeToggle" title="Light / dark mode" aria-label="Toggle theme"></button>
        <div class="eng-toggle" id="engToggle">
          <button class="eng-seg active" data-engmode="retainer">Monthly Services</button>
          <button class="eng-seg" data-engmode="project">Projects</button>
        </div>
        <div id="roleControls"></div>
        <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
      </div>
    </header>

    <div class="preview-banner" id="previewBanner" style="display:none">
      <span>👁 Previewing as <span id="previewClientName">client</span> — read-only client view</span>
      <button id="exitPreview">Exit preview</button>
    </div>

    <main class="content" id="content">
      <section class="page active" data-page="exec"></section>
      <section class="page" data-page="projectplan"></section>
      <section class="page" data-page="status"></section>
      <section class="page" data-page="docs"></section>
      <section class="page" data-page="files"></section>
      <section class="page" data-page="backlog"></section>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js?v=134"></script>
<script src="assets/js/supabase-sync.js?v=134"></script>
<script src="assets/js/auth.js?v=134"></script>
<script>requireAuth();</script>
<script src="assets/data/celtic-elevator.js"></script>
<script src="assets/js/present-docs.js?v=134"></script>
<script src="assets/js/exec-summary.js?v=134"></script>
<script src="assets/js/app.js?v=134"></script>
</body>
</html>
