<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJA Client Portal — Sign In</title>
<link rel="icon" href="assets/img/favicon.ico?v=260" sizes="16x16">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png?v=260">
<script>(function(){try{if(localStorage.getItem('tja_theme')!=='dark')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css?v=260">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand-lockup">
      <div class="brand-logo">
        <svg viewBox="0 0 474 218" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The James Agency"><rect width="474" height="218" rx="6" fill="#F68E21"/><text x="237" y="158" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="170" letter-spacing="-6">tja</text></svg>
        <img src="assets/img/tja-logo.svg" alt="The James Agency" onerror="this.remove()">
      </div>
      <div class="brand-sub">Client Portal</div>
    </div>

    <div class="login-title">Sign in</div>
    <div class="login-hint">Enter the credentials provided by your account team.</div>

    <div class="login-error" id="loginError">Incorrect email or password. Please try again.</div>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <div class="login-foot">
      © 2026 The James Agency · v2.59
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js?v=260"></script>
<script src="assets/js/version-check.js?v=260"></script>
<script src="assets/js/supabase-sync.js?v=260"></script>
<script src="assets/js/auth.js?v=260"></script>
<!-- client roster on the login page so per-client logins resolve to their own workspace -->
<script src="assets/js/clients.js?v=260"></script>
<script src="assets/js/client-template.js?v=260"></script>
<script src="assets/js/client-store.js?v=260"></script>
<script>
  // Deep-link from the deliverable email (?open=docs): stash the target page so app.js
  // opens it after login. Same key the notification-center deep-link uses — the client
  // lands straight on Present Docs whether they're already signed in or have to log in.
  try {
    const openTo = new URLSearchParams(location.search).get("open");
    if (openTo) sessionStorage.setItem("tja_open_page", openTo);
  } catch (e) {}

  // Staff (admin + creative) land on the client picker; clients go straight to their workspace.
  const landing = () => (typeof isStaff === "function" && isStaff()) ? "clients.html" : "dashboard.html";

  // If already signed in, skip the login form. restoreSession() also rebuilds the
  // per-tab session from a persisted Supabase login (new tab ≠ re-type password).
  if (getSession()) window.location.replace(landing());
  else restoreSession().then(ok => { if (ok) window.location.replace(landing()); });

  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true;
    const okLogin = await login(email, password);     // Supabase when configured, mock otherwise
    btn.disabled = false;
    if (okLogin) window.location.replace(landing());
    else document.getElementById("loginError").classList.add("show");
  });
</script>
</body>
</html>
