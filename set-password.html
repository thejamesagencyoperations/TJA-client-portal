<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set your password · TJA Client Portal</title>
<link rel="icon" href="assets/img/favicon.ico?v=284" sizes="16x16">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png?v=284">
<script>(function(){try{if(localStorage.getItem('tja_theme')!=='dark')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css?v=284">
<style>
  .sp-note { font-size: .8rem; color: var(--text-dim); margin: 0 0 18px; line-height: 1.5; text-align: center; }
  .sp-err { display: none; background: rgba(239,83,80,.1); border: 1px solid rgba(239,83,80,.4);
    color: #ef5350; font-size: .8rem; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; line-height: 1.5; }
  .sp-ok { text-align: center; }
  .sp-ok .big { font-size: 2.2rem; line-height: 1; margin-bottom: 10px; }
  .sp-rules { font-size: .72rem; color: var(--text-faint); margin: -6px 0 14px; }
  .sp-rules b { color: var(--text-dim); }
  .sp-strength { height: 4px; border-radius: 20px; background: var(--line); overflow: hidden; margin: 8px 0 4px; }
  .sp-strength > i { display: block; height: 100%; width: 0; border-radius: 20px; transition: width .2s, background .2s; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand-lockup">
      <div class="brand-logo">
        <svg viewBox="0 0 474 218" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The James Agency"><rect width="474" height="218" rx="6" fill="#F68E21"/><text x="237" y="158" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="170" letter-spacing="-6">tja</text></svg>
        <img src="assets/img/tja-logo.svg" alt="The James Agency" onerror="this.remove()">
      </div>
      <div class="brand-sub">Client Portal</div>
    </div>

    <!-- while the token in the URL is being checked -->
    <div id="spLoading">
      <p class="sp-note">Checking your invite…</p>
    </div>

    <!-- the form -->
    <form id="spForm" style="display:none">
      <p class="sp-note">Welcome<span id="spWho"></span> — choose a password to finish setting up your account.</p>
      <div class="sp-err" id="spErr"></div>
      <div class="field">
        <label for="spPass">New password</label>
        <input type="password" id="spPass" placeholder="••••••••••••" autocomplete="new-password" required>
        <div class="sp-strength"><i id="spBar"></i></div>
        <div class="sp-rules" id="spRules">At least <b>8 characters</b>.</div>
      </div>
      <div class="field">
        <label for="spPass2">Confirm password</label>
        <input type="password" id="spPass2" placeholder="••••••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="spSave">Set password &amp; sign in</button>
    </form>

    <!-- the link was bad/expired -->
    <div class="sp-ok" id="spDead" style="display:none">
      <div class="sp-err" style="display:block" id="spDeadMsg"></div>
      <a class="btn btn-primary" href="index.html" style="display:inline-block;text-decoration:none">Go to sign in</a>
    </div>

    <div class="login-foot">© 2026 The James Agency</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js?v=284"></script>
<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const cfg = window.SUPABASE_CONFIG || {};
  const show = (id) => { ["spLoading", "spForm", "spDead"].forEach(x => $(x).style.display = "none"); $(id).style.display = ""; };
  const dead = (msg) => { $("spDeadMsg").textContent = msg; show("spDead"); };

  if (!cfg.url || !window.supabase) { dead("The portal isn't configured. Contact your account manager."); return; }
  // detectSessionInUrl consumes the token in the URL hash and establishes a session.
  // ISOLATED storageKey: the portal's own tabs keep a supabase client on the DEFAULT
  // storage slot with auto-refresh running — sharing that slot meant an open admin tab
  // could clobber the freshly-redeemed invite session between page load and the submit
  // click ("Auth session missing!", live-tested 2026-07-17). This page redeems into its
  // own slot, then finishes with a REAL signInWithPassword on the default slot, so the
  // portal picks up a clean canonical session.
  const sb = window.supabase.createClient(cfg.url, cfg.anonKey, {
    auth: { detectSessionInUrl: true, flowType: "implicit", storageKey: "tja-setpw-auth" },
  });
  let toks = null;   // in-memory copy of the redeemed session's tokens — survives storage games
  // …and a per-tab copy that survives a same-tab RELOAD: mobile browsers discard and
  // reload backgrounded pages (email-app switch, keyboard, memory pressure), which kills
  // JS memory while the one-time token in the URL is already spent. sessionStorage rides
  // out that reload, so the form comes back instead of "link already used".
  const TOKS_KEY = "tja-setpw-toks";
  function saveToks(t) { toks = t; try { sessionStorage.setItem(TOKS_KEY, JSON.stringify(t)); } catch (e) {} }
  function savedToks() { try { return JSON.parse(sessionStorage.getItem(TOKS_KEY)); } catch (e) { return null; } }

  /* ---------- redeem the invite ----------
     Supabase sends the token back one of two ways depending on the link type, and
     which one you get is not worth guessing — handle both:
       • hash  #access_token=…            → supabase-js picks it up itself
       • query ?token_hash=…&type=invite  → we must verify it explicitly
     An expired or reused link produces no session, which is the common real-world
     case (24h expiry), so it gets a plain-English explanation rather than silence. */
  async function redeem() {
    const q = new URLSearchParams(location.search);
    const h = new URLSearchParams(location.hash.replace(/^#/, ""));

    const errDesc = q.get("error_description") || h.get("error_description");
    if (errDesc) return { ok: false, msg: errDesc };

    const tokenHash = q.get("token_hash");
    const type = q.get("type") || "invite";
    if (tokenHash) {
      const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type });
      // "already used" + tokens stashed this tab = WE spent it before a mid-flow reload
      // (mobile browsers discard backgrounded pages). Re-arm from the stash and carry on.
      if (error) {
        const saved = savedToks();
        if (saved) {
          try {
            const { data: re, error: e2 } = await sb.auth.setSession(saved);
            if (!e2 && re && re.session) { saveToks({ access_token: re.session.access_token, refresh_token: re.session.refresh_token }); return { ok: true, session: re.session }; }
          } catch (e3) {}
        }
        return { ok: false, msg: error.message };
      }
    }
    // give detectSessionInUrl a moment on the hash path
    for (let i = 0; i < 12; i++) {
      const { data } = await sb.auth.getSession();
      if (data.session) {
        saveToks({ access_token: data.session.access_token, refresh_token: data.session.refresh_token });
        return { ok: true, session: data.session };
      }
      await new Promise(r => setTimeout(r, 120));
    }
    return { ok: false, msg: "" };
  }

  const r = await redeem();
  if (!r.ok) {
    dead(r.msg
      ? "That invite link didn't work: " + r.msg
      : "This invite link has expired or has already been used. Ask your account manager to send a new one — they expire after 24 hours.");
    return;
  }

  const email = r.session.user.email || "";
  $("spWho").textContent = email ? ", " + email : "";
  show("spForm");
  setTimeout(() => $("spPass").focus(), 40);

  /* ---------- strength meter — guidance, not a gate ---------- */
  const bar = $("spBar");
  $("spPass").addEventListener("input", (e) => {
    const v = e.target.value;
    let s = 0;
    if (v.length >= 8) s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const pct = [0, 20, 40, 60, 80, 100][s];
    bar.style.width = pct + "%";
    bar.style.background = s <= 2 ? "#ef5350" : s === 3 ? "#f5b342" : "#36c275";
  });

  $("spForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("spErr").style.display = "none";
    const p1 = $("spPass").value, p2 = $("spPass2").value;
    if (p1.length < 8) { $("spErr").textContent = "Password must be at least 8 characters."; $("spErr").style.display = "block"; return; }
    if (p1 !== p2) { $("spErr").textContent = "Those two passwords don't match."; $("spErr").style.display = "block"; return; }

    $("spSave").disabled = true; $("spSave").textContent = "Setting your password…";
    // The redeemed session may have been dropped since page load (storage games from
    // other tabs, long pause before submitting) — re-arm it from the in-memory tokens
    // before updateUser, and if even that fails, say something actionable instead of
    // the bare "Auth session missing!" this used to surface.
    const { data: cur } = await sb.auth.getSession();
    if (!(cur && cur.session)) {
      const t = toks || savedToks();
      if (t) { try { await sb.auth.setSession(t); } catch (e2) {} }
    }
    const { error } = await sb.auth.updateUser({ password: p1 });
    if (error) {
      $("spErr").textContent = /session/i.test(error.message)
        ? "This link's session was interrupted — ask your account manager to send a fresh link and use it in one go."
        : error.message;
      $("spErr").style.display = "block";
      $("spSave").disabled = false; $("spSave").textContent = "Set password & sign in";
      return;
    }
    // Sign into the PORTAL's own auth storage with the brand-new password — a clean,
    // canonical session that index.html's restoreSession() picks up. (Redemption
    // happened in this page's ISOLATED storage slot, deliberately.)
    try {
      const portal = window.supabase.createClient(cfg.url, cfg.anonKey);
      await portal.auth.signInWithPassword({ email, password: p1 });
    } catch (e3) { /* worst case they type the password they just chose */ }
    // scope:"local" — a global sign-out would revoke EVERY session for this user,
    // including the portal one created a moment ago.
    try { await sb.auth.signOut({ scope: "local" }); } catch (e4) {}
    // Clear any per-tab portal session too: index.html trusts an existing
    // sessionStorage session over rebuilding, so a stale one (e.g. an admin doing
    // this in their own browser) would land them in the WRONG account.
    try {
      sessionStorage.removeItem("tja_portal_session");
      sessionStorage.removeItem("tja_preview_client");
      sessionStorage.removeItem(TOKS_KEY);   // the stashed redemption tokens are spent — drop them
    } catch (e5) {}
    location.replace("index.html");
  });
})();
</script>
</body>
</html>
