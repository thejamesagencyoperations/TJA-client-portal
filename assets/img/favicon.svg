<?xml version="1.0" encoding="UTF-8"?>
<!-- TJA browser-tab icon.
     Built from the REAL logo artwork (assets/img/tja-logo.svg), not re-typed text:
     favicons can't rely on a font being installed, and the logo's "tja" is a custom face.

     In the source logo the orange is a FIELD with the letters knocked out of it, so the
     white comes from a background rect. Reusing that rect directly leaves a white hairline
     at the crop edges (wherever the orange path stops short of the cut). So instead the
     orange field is used as a MASK: white paints only where the field ISN'T — i.e. exactly
     the letters — and the orange comes from the tile beneath. No seams at any size.

     The nested <svg> viewBox crops the wide lockup (473x216) down to just the letters. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="11" fill="#f68e21"/>
  <svg x="5" y="11" width="54" height="42" viewBox="162 0 274 216" preserveAspectRatio="xMidYMid meet">
    <defs>
      <mask id="tja" maskUnits="userSpaceOnUse" x="0" y="0" width="473.55" height="216">
        <rect width="473.55" height="216" fill="#fff"/>
        <!-- the 'a' counter — orange in the logo, so masked out too -->
        <path fill="#000" d="m368.62,119.54c-19.8,4.89-22.73,11.49-22.73,18.57,0,10.51,7.33,15.64,21.26,15.64,22.24,0,31.53-10.75,31.53-21.75v-25.91h-.49c-1.47,3.18-3.91,6.6-29.57,13.44Z"/>
        <!-- the orange field: everything it covers is hidden, leaving the letters -->
        <path fill="#000" d="m301.35,0v23.48h-28.28V0H0v216h244.28v-21.5h10.9c15.04,0,17.9-6.22,17.9-20.49v-95.49s0-33.72,0-33.72h28.27v59.14s0,73.18,0,73.18c0,18.56-3.53,31.56-14.13,38.88h169.36V0h-155.23Zm-49.78,68.7h-32.26v59.39c0,13.44,2.69,19.31,16.86,19.31h10.27v26.89h-12.46c-32.51,0-42.04-14.67-42.04-43.26v-62.33h-19.55v-23.95h20.29V12.97h26.4v31.78h32.51v23.95Zm174,105.59h-23.71v-12.96h-.49c-1.22,1.96-11.49,16.62-36.66,16.62-32.26,0-45.71-18.33-45.71-37.89,0-22.73,12.71-32.75,44-40.33,28.11-7.09,34.71-10.02,34.71-19.31,0-8.31-7.09-15.4-23.71-15.4-19.8,0-25.67,11.24-28.84,22.73l-23.71-9.04c5.13-20.53,21.75-37.64,51.81-37.64s52.31,13.69,52.31,49.37v83.84Z"/>
      </mask>
    </defs>
    <rect width="473.55" height="216" fill="#fff" mask="url(#tja)"/>
  </svg>
</svg>
