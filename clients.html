<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJA — Clients</title>
<script>(function(){try{if(localStorage.getItem('tja_theme')!=='dark')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css?v=137">
</head>
<body data-role="admin">
<div class="clients-page">
  <header class="topbar">
    <div class="client-id">
      <div class="brand-logo brand-logo--sm">
        <svg viewBox="0 0 474 218" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The James Agency"><rect width="474" height="218" rx="6" fill="#F68E21"/><text x="237" y="158" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="170" letter-spacing="-6">tja</text></svg>
        <img src="assets/img/tja-logo.svg" alt="The James Agency" onerror="this.remove()">
      </div>
      <div class="client-id-text"><div class="client-line"><span class="client-name">Client Workspaces</span></div></div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="themeToggle" title="Light / dark mode" aria-label="Toggle theme"></button>
      <span class="role-pill">Admin</span>
      <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main class="content">
    <div class="page-head">
      <div class="page-title">Clients</div>
      <div class="page-desc">Choose a client workspace to open.</div>
    </div>
    <div class="proj-grid" id="clientGrid"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js?v=137"></script>
<script src="assets/js/supabase-sync.js?v=137"></script>
<script src="assets/js/auth.js?v=137"></script>
<script>
  // gate: must be signed in, and this picker is admin-only (clients go straight to their workspace)
  requireAuth();
  if (typeof isAdmin === "function" && !isAdmin()) window.location.replace("dashboard.html");
</script>
<script src="assets/js/clients.js"></script>
<script>
  const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  // theme toggle (self-contained; mirrors the dashboard)
  const SUN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
  const MOON = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`;
  function curTheme(){ try { return localStorage.getItem("tja_theme") || "light"; } catch { return "light"; } }
  function applyTheme(t){
    if (t === "light") document.documentElement.setAttribute("data-theme","light");
    else document.documentElement.removeAttribute("data-theme");
    const b = document.getElementById("themeToggle");
    if (b){ const light = t === "light"; b.innerHTML = light ? MOON : SUN; b.title = light ? "Switch to dark mode" : "Switch to light mode"; }
  }
  applyTheme(curTheme());
  document.getElementById("themeToggle").addEventListener("click", () => {
    const next = curTheme() === "light" ? "dark" : "light";
    try { localStorage.setItem("tja_theme", next); } catch {}
    applyTheme(next);
  });

  // render client tiles
  const grid = document.getElementById("clientGrid");
  const clients = window.TJA_CLIENTS || [];
  grid.innerHTML = clients.map(c => `
    <button class="proj-tile client-tile" data-client="${esc(c.id)}">
      <div class="client-tile-head">
        <span class="client-tile-logo">${c.logo ? `<img src="${esc(c.logo)}" alt="${esc(c.name)}">` : esc(c.initials || "?")}</span>
        <span class="proj-tile-name">${esc(c.name)}</span>
      </div>
      ${c.tagline ? `<div class="proj-tile-sub">${esc(c.tagline)}</div>` : ""}
      ${c.engagements ? `<div class="proj-tile-foot">${esc(c.engagements)}</div>` : ""}
    </button>`).join("")
    + `<button class="proj-tile proj-tile-add" id="addClient" title="Coming soon"><span class="pta-plus">＋</span> Add client</button>`;

  grid.addEventListener("click", e => {
    const t = e.target.closest("[data-client]");
    if (t) {
      // remember which client workspace the admin chose, then open the dashboard
      try {
        const s = JSON.parse(sessionStorage.getItem("tja_portal_session") || "{}");
        s.client = t.dataset.client;
        sessionStorage.setItem("tja_portal_session", JSON.stringify(s));
      } catch {}
      window.location.href = "dashboard.html";
      return;
    }
    if (e.target.closest("#addClient")) alert("Adding new clients comes in a later phase. For now this lists the workspaces already set up.");
  });
</script>
</body>
</html>
